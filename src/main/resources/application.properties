spring.application.name=file-manager-service
server.port=${SERVER_PORT:8083}

soap.service.url=${SOAP_SERVICE_URL:http://168.144.38.111:8081/ws}
app.base-url=${APP_BASE_URL:https://octopus-app-phhnx.ondigitalocean.app}
app.upload-dir=${UPLOAD_DIR:/tmp/uploads}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

s3.access.key=${S3_ACCESS_KEY:}
s3.secret.key=${S3_SECRET_KEY:}
s3.bucket-name=${S3_BUCKET_NAME:}
s3.endpoint=${S3_ENDPOINT:}
s3.public-base-url=${S3_PUBLIC_BASE_URL:}
s3.region=${S3_REGION:sgp1}
